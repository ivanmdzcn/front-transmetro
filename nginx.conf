server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Esto es vital para que las rutas de Angular funcionen
        try_files $uri $uri/ /index.html;
    }

    # Opcional: Si quieres que Nginx redirija las peticiones de API
    # location /api {
    #     proxy_pass http://192.168.1.240:9090/api;
    # }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}