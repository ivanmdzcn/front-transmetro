<div class="container-fluid py-4">

  <!-- Cabecera -->
  <div class="d-flex align-items-center justify-content-between mb-4">
    <h2 class="h4 fw-semibold mb-0">
      <i class="bi bi-shield-half me-2 text-primary"></i>Gestión de Roles
    </h2>
    <a *ngIf="puedeCrear" routerLink="crear" class="btn btn-primary">
      <i class="bi bi-plus-lg me-1"></i>Nuevo Rol
    </a>
  </div>

  <!-- Error -->
  <div *ngIf="errorMsg" class="alert alert-danger alert-dismissible" role="alert">
    <i class="bi bi-exclamation-triangle me-2"></i>{{ errorMsg }}
    <button type="button" class="btn-close" (click)="errorMsg = ''"></button>
  </div>

  <!-- Spinner -->
  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
    <p class="mt-2 text-muted">Cargando roles...</p>
  </div>

  <!-- Tabla -->
  <div *ngIf="!loading" class="card shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Descripción</th>
              <th class="text-center">Estado</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let rol of roles">
              <td class="text-muted">{{ rol.id }}</td>
              <td class="fw-semibold">{{ rol.nombre }}</td>
              <td class="text-muted">{{ rol.descripcion || 'Sin descripción' }}</td>
              <td class="text-center">
                <span class="badge" [ngClass]="rol.activo ? 'bg-success' : 'bg-danger'">
                  {{ rol.activo ? 'Activo' : 'Inactivo' }}
                </span>
              </td>
              <td class="text-center">
                <a *ngIf="puedeVerPermisos"
                   [routerLink]="[rol.id, 'permisos']"
                   class="btn btn-sm btn-outline-secondary me-1"
                   title="Gestionar permisos">
                  <i class="bi bi-key"></i>
                </a>
                <a *ngIf="puedeEditar"
                   [routerLink]="['editar', rol.id]"
                   class="btn btn-sm btn-outline-primary me-1"
                   title="Editar">
                  <i class="bi bi-pencil"></i>
                </a>
                <button *ngIf="puedeDesactivar"
                        class="btn btn-sm"
                        [ngClass]="rol.activo ? 'btn-outline-warning' : 'btn-outline-success'"
                        (click)="cambiarEstado(rol.id, rol.activo)"
                        [title]="rol.activo ? 'Desactivar' : 'Activar'">
                  <i class="bi" [ngClass]="rol.activo ? 'bi-slash-circle' : 'bi-check-circle'"></i>
                </button>
              </td>
            </tr>
            <tr *ngIf="roles.length === 0">
              <td colspan="5" class="text-center py-4 text-muted">
                <i class="bi bi-inbox display-6 d-block mb-2"></i>
                No hay roles registrados.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>
