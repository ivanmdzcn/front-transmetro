<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="h3 fw-bold text-primary mb-0">
    <i class="bi bi-speedometer2 me-2"></i>Dashboard
  </h1>
  <span class="text-muted small">Bienvenido al sistema</span>
</div>

<!-- Tarjetas de resumen -->
<div class="row g-3 mb-4">
  <div class="col-12 col-sm-6 col-xl-3" *ngFor="let card of summaryCards">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-body d-flex align-items-center gap-3">
        <div class="card-icon rounded-3 p-3" [style.background]="card.color">
          <i [class]="'bi ' + card.icon + ' fs-4 text-white'"></i>
        </div>
        <div>
          <div class="text-muted small">{{ card.label }}</div>
          <div class="fw-bold fs-4">{{ card.value }}</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Área de contenido (se llenará con la documentación del backend) -->
<div class="card border-0 shadow-sm">
  <div class="card-header bg-white border-bottom fw-semibold">
    <i class="bi bi-clock-history me-2 text-secondary"></i>Actividad reciente
  </div>
  <div class="card-body text-center py-5 text-muted">
    <i class="bi bi-inbox fs-1 d-block mb-2"></i>
    Este módulo se integrará con el API del backend.
  </div>
</div>
