<div class="app-shell d-flex flex-column min-vh-100">

  <!-- HEADER -->
  <app-header (toggleSidebar)="sidebarOpen = !sidebarOpen"></app-header>

  <div class="app-body d-flex flex-grow-1">

    <!-- SIDEBAR -->
    <app-sidebar [isOpen]="sidebarOpen" (closeSidebar)="sidebarOpen = false"></app-sidebar>

    <!-- Overlay para móvil -->
    <div
      class="sidebar-overlay"
      [class.active]="sidebarOpen"
      (click)="sidebarOpen = false"
    ></div>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content flex-grow-1 p-4" [class.sidebar-open]="sidebarOpen">
      <router-outlet></router-outlet>
    </main>

  </div>

  <!-- FOOTER -->
  <app-footer></app-footer>

</div>
