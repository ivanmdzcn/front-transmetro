<div class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-6">
      <div class="d-flex align-items-center mb-4">
        <a routerLink="/accesos" class="btn btn-sm btn-outline-secondary me-3">
          <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="h4 fw-semibold mb-0">
          <i class="bi bi-door-open me-2 text-primary"></i>
          {{ isEditMode ? 'Editar Acceso' : 'Nuevo Acceso' }}
        </h2>
      </div>

      <div *ngIf="errorMsg" class="alert alert-danger">
        <i class="bi bi-exclamation-triangle me-2"></i>{{ errorMsg }}
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-4">
          <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

            <div class="mb-3">
              <label class="form-label fw-semibold">Descripción <span class="text-danger">*</span></label>
              <input type="text" formControlName="descripcion" class="form-control"
                     [ngClass]="{'is-invalid': f['descripcion'].invalid && f['descripcion'].touched}"
                     placeholder="Ej: Acceso principal norte" />
              <div class="invalid-feedback">La descripción es obligatoria.</div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">Estación <span class="text-danger">*</span></label>
              <select formControlName="idEstacion" class="form-select"
                      [ngClass]="{'is-invalid': f['idEstacion'].invalid && f['idEstacion'].touched}">
                <option [ngValue]="null">-- Seleccionar estación --</option>
                <option *ngFor="let e of estaciones" [ngValue]="e.idEstacion">
                  {{ e.nombre }} — {{ e.nombreMunicipalidad }}
                </option>
              </select>
              <div class="invalid-feedback">La estación es obligatoria.</div>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary" [disabled]="loading">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
                {{ isEditMode ? 'Actualizar' : 'Crear' }}
              </button>
              <a routerLink="/accesos" class="btn btn-outline-secondary">Cancelar</a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
