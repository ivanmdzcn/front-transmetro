<div class="container-fluid py-4">
  <div class="d-flex align-items-center justify-content-between mb-4">
    <h2 class="h4 fw-semibold mb-0">
      <i class="bi bi-door-open me-2 text-primary"></i>Accesos
    </h2>
    <a *ngIf="puedeCrear" routerLink="crear" class="btn btn-primary">
      <i class="bi bi-plus-circle me-1"></i>Nuevo Acceso
    </a>
  </div>

  <div *ngIf="errorMsg" class="alert alert-danger alert-dismissible">
    <i class="bi bi-exclamation-triangle me-2"></i>{{ errorMsg }}
    <button type="button" class="btn-close" (click)="errorMsg = ''"></button>
  </div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
  </div>

  <div *ngIf="!loading" class="card shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Descripción</th>
              <th>Estación</th>
              <th class="text-center">Estado</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let a of accesos">
              <td class="text-muted">{{ a.idAcceso }}</td>
              <td class="fw-semibold">{{ a.descripcion }}</td>
              <td>{{ a.nombreEstacion }}</td>
              <td class="text-center">
                <span class="badge" [ngClass]="a.activo ? 'bg-success' : 'bg-danger'">
                  {{ a.activo ? 'Activo' : 'Inactivo' }}
                </span>
              </td>
              <td class="text-center">
                <a *ngIf="puedeEditar" [routerLink]="['editar', a.idAcceso]"
                   class="btn btn-sm btn-outline-primary me-1" title="Editar">
                  <i class="bi bi-pencil"></i>
                </a>
                <a [routerLink]="[a.idAcceso, 'guardias']"
                   class="btn btn-sm btn-outline-secondary me-1" title="Guardias">
                  <i class="bi bi-shield-check"></i>
                </a>
                <button class="btn btn-sm"
                        [ngClass]="a.activo ? 'btn-outline-warning' : 'btn-outline-success'"
                        (click)="cambiarEstado(a.idAcceso, a.activo)"
                        [title]="a.activo ? 'Desactivar' : 'Activar'">
                  <i class="bi" [ngClass]="a.activo ? 'bi-toggle-on' : 'bi-toggle-off'"></i>
                </button>
              </td>
            </tr>
            <tr *ngIf="accesos.length === 0">
              <td colspan="5" class="text-center text-muted py-4">No hay accesos registrados.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
