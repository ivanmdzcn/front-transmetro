<div class="container-fluid py-4">

  <!-- Cabecera -->
  <div class="d-flex align-items-center justify-content-between mb-4">
    <h2 class="h4 fw-semibold mb-0">
      <i class="bi bi-people me-2 text-primary"></i>Gestión de Usuarios
    </h2>
    <a *ngIf="puedeCrear" routerLink="crear" class="btn btn-primary">
      <i class="bi bi-person-plus me-1"></i>Nuevo Usuario
    </a>
  </div>

  <!-- Error -->
  <div *ngIf="errorMsg" class="alert alert-danger alert-dismissible" role="alert">
    <i class="bi bi-exclamation-triangle me-2"></i>{{ errorMsg }}
    <button type="button" class="btn-close" (click)="errorMsg = ''"></button>
  </div>

  <!-- Spinner -->
  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
    <p class="mt-2 text-muted">Cargando usuarios...</p>
  </div>

  <!-- Tabla -->
  <div *ngIf="!loading" class="card shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Usuario</th>
              <th>Email</th>
              <th>Rol</th>
              <th class="text-center">Estado</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let u of usuarios">
              <td class="text-muted">{{ u.id }}</td>
              <td class="fw-semibold">{{ u.nombre }}</td>
              <td><code>{{ u.nombreUsuario }}</code></td>
              <td>{{ u.email }}</td>
              <td>
                <span *ngIf="u.nombreRol; else sinRol" class="badge bg-secondary">{{ u.nombreRol }}</span>
                <ng-template #sinRol><span class="text-muted fst-italic">Sin rol</span></ng-template>
              </td>
              <td class="text-center">
                <span class="badge" [ngClass]="u.activo ? 'bg-success' : 'bg-danger'">
                  {{ u.activo ? 'Activo' : 'Inactivo' }}
                </span>
              </td>
              <td class="text-center">
                <a *ngIf="puedeVerPermisos"
                   [routerLink]="[u.id, 'permisos']"
                   class="btn btn-sm btn-outline-secondary me-1"
                   title="Gestionar permisos">
                  <i class="bi bi-key"></i>
                </a>
                <a *ngIf="puedeEditar"
                   [routerLink]="['editar', u.id]"
                   class="btn btn-sm btn-outline-primary me-1"
                   title="Editar">
                  <i class="bi bi-pencil"></i>
                </a>
                <button *ngIf="puedeDesactivar"
                        class="btn btn-sm me-1"
                        [ngClass]="u.activo ? 'btn-outline-warning' : 'btn-outline-success'"
                        (click)="cambiarEstado(u.id, u.activo)"
                        [title]="u.activo ? 'Desactivar' : 'Activar'">
                  <i class="bi" [ngClass]="u.activo ? 'bi-person-x' : 'bi-person-check'"></i>
                </button>
                <!-- <button *ngIf="puedeDesactivar"
                        class="btn btn-sm btn-outline-danger"
                        (click)="eliminar(u.id)"
                        title="Eliminar">
                  <i class="bi bi-trash"></i>
                </button> -->
              </td>
            </tr>
            <tr *ngIf="usuarios.length === 0">
              <td colspan="7" class="text-center py-4 text-muted">
                <i class="bi bi-inbox display-6 d-block mb-2"></i>
                No hay usuarios registrados.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>
