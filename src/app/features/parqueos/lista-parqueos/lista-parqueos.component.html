<div class="container-fluid py-4">
  <div class="d-flex align-items-center justify-content-between mb-4">
    <h2 class="h4 fw-semibold mb-0">
      <i class="bi bi-p-circle me-2 text-primary"></i>Parqueos
    </h2>
    <a *ngIf="puedeCrear" routerLink="crear" class="btn btn-primary">
      <i class="bi bi-plus-circle me-1"></i>Nuevo Parqueo
    </a>
  </div>

  <div *ngIf="errorMsg" class="alert alert-danger alert-dismissible">
    <i class="bi bi-exclamation-triangle me-2"></i>{{ errorMsg }}
    <button type="button" class="btn-close" (click)="errorMsg = ''"></button>
  </div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
  </div>

  <div *ngIf="!loading" class="card shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Estación</th>
              <th class="text-center">Capacidad</th>
              <th class="text-center">Estado</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let p of parqueos">
              <td class="text-muted">{{ p.idParqueo }}</td>
              <td class="fw-semibold">{{ p.nombre }}</td>
              <td>{{ p.nombreEstacion }}</td>
              <td class="text-center">
                <span class="badge bg-info text-dark">{{ p.capacidad }} buses</span>
              </td>
              <td class="text-center">
                <span class="badge" [ngClass]="p.activo ? 'bg-success' : 'bg-danger'">
                  {{ p.activo ? 'Activo' : 'Inactivo' }}
                </span>
              </td>
              <td class="text-center">
                <a *ngIf="puedeEditar" [routerLink]="['editar', p.idParqueo]"
                   class="btn btn-sm btn-outline-primary me-1" title="Editar">
                  <i class="bi bi-pencil"></i>
                </a>
                <button class="btn btn-sm"
                        [ngClass]="p.activo ? 'btn-outline-warning' : 'btn-outline-success'"
                        (click)="cambiarEstado(p.idParqueo, p.activo)"
                        [title]="p.activo ? 'Desactivar' : 'Activar'">
                  <i class="bi" [ngClass]="p.activo ? 'bi-toggle-on' : 'bi-toggle-off'"></i>
                </button>
              </td>
            </tr>
            <tr *ngIf="parqueos.length === 0">
              <td colspan="6" class="text-center text-muted py-4">No hay parqueos registrados.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
