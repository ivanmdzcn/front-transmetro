<div class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-6">

      <div class="d-flex align-items-center mb-4">
        <a routerLink="/municipalidades" class="btn btn-sm btn-outline-secondary me-3">
          <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="h4 fw-semibold mb-0">
          <i class="bi bi-building me-2 text-primary"></i>
          {{ isEditMode ? 'Editar Municipalidad' : 'Nueva Municipalidad' }}
        </h2>
      </div>

      <div *ngIf="loading && isEditMode" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
      </div>

      <div *ngIf="!(loading && isEditMode)">
        <div *ngIf="errorMsg" class="alert alert-danger">
          <i class="bi bi-exclamation-triangle me-2"></i>{{ errorMsg }}
        </div>

        <div class="card shadow-sm">
          <div class="card-body p-4">
            <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

              <div class="mb-3">
                <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
                <input type="text" formControlName="nombre" class="form-control"
                       [ngClass]="{'is-invalid': f['nombre'].invalid && f['nombre'].touched}"
                       placeholder="Ej: Municipalidad de Guatemala" />
                <div class="invalid-feedback">
                  <span *ngIf="f['nombre'].errors?.['required']">El nombre es obligatorio.</span>
                  <span *ngIf="f['nombre'].errors?.['minlength']">Mínimo 2 caracteres.</span>
                </div>
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold">Departamento <span class="text-danger">*</span></label>
                <input type="text" formControlName="departamento" class="form-control"
                       [ngClass]="{'is-invalid': f['departamento'].invalid && f['departamento'].touched}"
                       placeholder="Ej: Guatemala" />
                <div class="invalid-feedback">
                  <span *ngIf="f['departamento'].errors?.['required']">El departamento es obligatorio.</span>
                </div>
              </div>

              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary" [disabled]="loading">
                  <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
                  {{ isEditMode ? 'Actualizar' : 'Crear' }}
                </button>
                <a routerLink="/municipalidades" class="btn btn-outline-secondary">Cancelar</a>
              </div>

            </form>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
