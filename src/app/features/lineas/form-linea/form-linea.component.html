<div class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-6">
      <div class="d-flex align-items-center mb-4">
        <a routerLink="/lineas" class="btn btn-sm btn-outline-secondary me-3">
          <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="h4 fw-semibold mb-0">
          <i class="bi bi-signpost-split me-2 text-primary"></i>
          {{ isEditMode ? 'Editar Línea' : 'Nueva Línea' }}
        </h2>
      </div>

      <div *ngIf="errorMsg" class="alert alert-danger">
        <i class="bi bi-exclamation-triangle me-2"></i>{{ errorMsg }}
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-4">
          <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

            <div class="mb-3">
              <label class="form-label fw-semibold">Nombre de la línea <span class="text-danger">*</span></label>
              <input type="text" formControlName="nombre" class="form-control"
                     [ngClass]="{'is-invalid': f['nombre'].invalid && f['nombre'].touched}"
                     placeholder="Ej: Línea 1 - Centro" />
              <div class="invalid-feedback">El nombre es obligatorio.</div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Municipalidad <span class="text-danger">*</span></label>
              <select formControlName="idMunicipalidad" class="form-select"
                      [ngClass]="{'is-invalid': f['idMunicipalidad'].invalid && f['idMunicipalidad'].touched}">
                <option [ngValue]="null">-- Seleccionar --</option>
                <option *ngFor="let m of municipalidades" [ngValue]="m.idMunicipalidad">
                  {{ m.nombre }} — {{ m.departamento }}
                </option>
              </select>
              <div class="invalid-feedback">La municipalidad es obligatoria.</div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">Descripción</label>
              <textarea formControlName="descripcion" class="form-control" rows="2"
                        placeholder="Descripción de la ruta..."></textarea>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary" [disabled]="loading">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
                {{ isEditMode ? 'Actualizar' : 'Crear' }}
              </button>
              <a routerLink="/lineas" class="btn btn-outline-secondary">Cancelar</a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
