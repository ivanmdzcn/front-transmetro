<div class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-6">
      <div class="d-flex align-items-center mb-4">
        <a routerLink="/estaciones" class="btn btn-sm btn-outline-secondary me-3">
          <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="h4 fw-semibold mb-0">
          <i class="bi bi-geo-alt me-2 text-primary"></i>
          {{ isEditMode ? 'Editar Estación' : 'Nueva Estación' }}
        </h2>
      </div>

      <div *ngIf="loading && isEditMode" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
      </div>

      <div *ngIf="!(loading && isEditMode)">
        <div *ngIf="errorMsg" class="alert alert-danger">
          <i class="bi bi-exclamation-triangle me-2"></i>{{ errorMsg }}
        </div>

        <div class="card shadow-sm">
          <div class="card-body p-4">
            <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

              <div class="mb-3">
                <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
                <input type="text" formControlName="nombre" class="form-control"
                       [ngClass]="{'is-invalid': f['nombre'].invalid && f['nombre'].touched}" />
                <div class="invalid-feedback">El nombre es obligatorio.</div>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Municipalidad <span class="text-danger">*</span></label>
                <select formControlName="idMunicipalidad" class="form-select"
                        [ngClass]="{'is-invalid': f['idMunicipalidad'].invalid && f['idMunicipalidad'].touched}">
                  <option [ngValue]="null">-- Seleccionar --</option>
                  <option *ngFor="let m of municipalidades" [ngValue]="m.idMunicipalidad">
                    {{ m.nombre }} — {{ m.departamento }}
                  </option>
                </select>
                <div class="invalid-feedback">La municipalidad es obligatoria.</div>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Dirección</label>
                <input type="text" formControlName="direccion" class="form-control" />
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Capacidad máxima <span class="text-danger">*</span></label>
                <input type="number" formControlName="capacidadMaxima" class="form-control" min="1"
                       [ngClass]="{'is-invalid': f['capacidadMaxima'].invalid && f['capacidadMaxima'].touched}" />
                <div class="invalid-feedback">Ingrese un valor mayor a 0.</div>
                <div class="form-text">Número máximo de pasajeros en espera en la estación.</div>
              </div>

              <div class="row">
                <div class="col-6 mb-4">
                  <label class="form-label fw-semibold">Latitud</label>
                  <input type="number" step="0.000001" formControlName="latitud" class="form-control" />
                </div>
                <div class="col-6 mb-4">
                  <label class="form-label fw-semibold">Longitud</label>
                  <input type="number" step="0.000001" formControlName="longitud" class="form-control" />
                </div>
              </div>

              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary" [disabled]="loading">
                  <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
                  {{ isEditMode ? 'Actualizar' : 'Crear' }}
                </button>
                <a routerLink="/estaciones" class="btn btn-outline-secondary">Cancelar</a>
              </div>

            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
