<div class="container-fluid py-4">
  <div class="d-flex align-items-center justify-content-between mb-4">
    <h2 class="h4 fw-semibold mb-0">
      <i class="bi bi-geo-alt me-2 text-primary"></i>Estaciones
    </h2>
    <div class="d-flex align-items-center gap-2">
      <a routerLink="monitoreo" class="btn btn-outline-info btn-sm">
        <i class="bi bi-activity me-1"></i>Monitoreo
      </a>
      <a *ngIf="puedeCrear" routerLink="crear" class="btn btn-primary">
        <i class="bi bi-plus-circle me-1"></i>Nueva Estación
      </a>
    </div>
  </div>

  <div *ngIf="errorMsg" class="alert alert-danger alert-dismissible">
    <i class="bi bi-exclamation-triangle me-2"></i>{{ errorMsg }}
    <button type="button" class="btn-close" (click)="errorMsg = ''"></button>
  </div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2 text-muted">Cargando...</p>
  </div>

  <div *ngIf="!loading" class="card shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Municipalidad</th>
              <th>Dirección</th>
              <th class="text-center">Estado</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let e of estaciones">
              <td class="text-muted">{{ e.idEstacion }}</td>
              <td class="fw-semibold">{{ e.nombre }}</td>
              <td>{{ e.nombreMunicipalidad }}</td>
              <td>{{ e.direccion || '—' }}</td>
              <td class="text-center">
                <span class="badge" [ngClass]="e.activo ? 'bg-success' : 'bg-danger'">
                  {{ e.activo ? 'Activa' : 'Inactiva' }}
                </span>
              </td>
              <td class="text-center">
                <a *ngIf="puedeEditar" [routerLink]="['editar', e.idEstacion]"
                   class="btn btn-sm btn-outline-primary me-1" title="Editar">
                  <i class="bi bi-pencil"></i>
                </a>
                <button class="btn btn-sm"
                        [ngClass]="e.activo ? 'btn-outline-warning' : 'btn-outline-success'"
                        (click)="cambiarEstado(e.idEstacion, e.activo)"
                        [title]="e.activo ? 'Desactivar' : 'Activar'">
                  <i class="bi" [ngClass]="e.activo ? 'bi-toggle-on' : 'bi-toggle-off'"></i>
                </button>
              </td>
            </tr>
            <tr *ngIf="estaciones.length === 0">
              <td colspan="6" class="text-center text-muted py-4">No hay estaciones registradas.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
