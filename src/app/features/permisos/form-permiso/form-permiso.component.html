<div class="container-fluid py-4">

  <div class="d-flex align-items-center mb-4">
    <a routerLink="/permisos" class="btn btn-sm btn-outline-secondary me-3">
      <i class="bi bi-arrow-left"></i>
    </a>
    <h2 class="h4 fw-semibold mb-0">
      <i class="bi bi-key me-2 text-primary"></i>
      {{ editando ? 'Editar permiso' : 'Nuevo permiso' }}
    </h2>
  </div>

  <div *ngIf="errorMsg" class="alert alert-danger"><i class="bi bi-exclamation-triangle me-2"></i>{{ errorMsg }}</div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Cargando...</span></div>
  </div>

  <div class="card border-0 shadow-sm mx-auto" style="max-width:600px">
    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="guardar()">

        <!-- Nombre -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
          <input formControlName="nombre"
                 type="text"
                 class="form-control"
                 [ngClass]="{'is-invalid': form.get('nombre')?.invalid && form.get('nombre')?.touched}"
                 placeholder="ej. usuarios.crear" />
          <div class="invalid-feedback">El nombre es requerido (mín. 3 caracteres).</div>
          <div class="form-text">Usar formato <code>modulo.accion</code> en minusculas.</div>
        </div>

        <!-- Módulo -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Módulo <span class="text-danger">*</span></label>
          <select formControlName="moduloId"
                  class="form-select"
                  [ngClass]="{'is-invalid': form.get('moduloId')?.invalid && form.get('moduloId')?.touched}">
            <option [ngValue]="null">Seleccionar módulo...</option>
            <option *ngFor="let m of modulos" [ngValue]="m.id">{{ m.nombre }}</option>
          </select>
          <div class="invalid-feedback">El módulo es requerido.</div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary" [disabled]="loading">
            <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
            {{ editando ? 'Guardar cambios' : 'Crear permiso' }}
          </button>
          <a routerLink="/permisos" class="btn btn-outline-secondary">Cancelar</a>
        </div>

      </form>
    </div>
  </div>

</div>
